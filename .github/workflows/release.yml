name: Release Standalone App

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

env:
  APP_NAME: Novalist
  EXECUTABLE_NAME: Novalist.Desktop
  MACOS_ICON_FILE: novalist.icns
  LINUX_ICON_FILE: novalist.png
  DOTNET_VERSION: 8.0.x
  PROJECT_PATH: Novalist.Desktop/Novalist.Desktop.csproj
  CONFIGURATION: Release

jobs:
  publish:
    name: Publish ${{ matrix.label }}
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            os: windows-latest
            rid: win-x64
            publish_dir: novalist-windows-x64
            artifact_name: novalist-windows-x64-installer
            package_name: novalist-windows-x64-setup.exe
          - label: macOS x64
            os: macos-latest
            rid: osx-x64
            publish_dir: novalist-macos-x64
            artifact_name: novalist-macos-x64-dmg
            package_name: novalist-macos-x64.dmg
          - label: macOS ARM64
            os: macos-latest
            rid: osx-arm64
            publish_dir: novalist-macos-arm64
            artifact_name: novalist-macos-arm64-dmg
            package_name: novalist-macos-arm64.dmg
          - label: Linux x64
            os: ubuntu-24.04
            rid: linux-x64
            publish_dir: novalist-linux-x64
            artifact_name: novalist-linux-x64-appimage
            package_name: Novalist-x86_64.AppImage

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Derive version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Extract digits from tag (e.g. "v1.2.3" → "1.2.3")
          VER="$(printf '%s' "$TAG" | grep -oE '[0-9]+(\.[0-9]+)*')"
          if [ -z "$VER" ]; then VER="0.0.1"; fi
          echo "prefix=$VER" >> "$GITHUB_OUTPUT"

      - name: Publish app
        run: >-
          dotnet publish "${{ env.PROJECT_PATH }}"
          -c "${{ env.CONFIGURATION }}"
          -r "${{ matrix.rid }}"
          --self-contained true
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -p:ContinuousIntegrationBuild=true
          -p:DebugSymbols=false
          -p:DebugType=None
          -p:VersionPrefix=${{ steps.version.outputs.prefix }}
          -p:VersionSuffix=
          -o "${{ github.workspace }}/dist/${{ matrix.publish_dir }}"

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Package app (Windows installer)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $appVersion = "${{ steps.version.outputs.prefix }}"
          $publishDir = (Resolve-Path (Join-Path $env:GITHUB_WORKSPACE "dist\${{ matrix.publish_dir }}")).ProviderPath
          $outputDir = Join-Path $env:GITHUB_WORKSPACE 'artifacts'
          $iconPath = (Resolve-Path (Join-Path $env:GITHUB_WORKSPACE 'Novalist.Desktop\novalist.ico')).ProviderPath
          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null

          $iscc = Join-Path ${env:ProgramFiles(x86)} 'Inno Setup 6\ISCC.exe'
          if (-not (Test-Path $iscc)) {
            $iscc = Join-Path $env:ProgramFiles 'Inno Setup 6\ISCC.exe'
          }
          if (-not (Test-Path $iscc)) {
            throw 'ISCC.exe not found after installing Inno Setup.'
          }

          $arguments = @(
            "/DAppVersion=$appVersion"
            "/DSourceDir=$publishDir"
            "/DOutputDir=$outputDir"
            "/DOutputBaseFilename=$([System.IO.Path]::GetFileNameWithoutExtension('${{ matrix.package_name }}'))"
            "/DInstallerIconFile=$iconPath"
            '.github\installers\windows\novalist.iss'
          )

          & $iscc @arguments

          if ($LASTEXITCODE -ne 0) {
            throw "Inno Setup compilation failed with exit code $LASTEXITCODE"
          }

      - name: Package app (macOS DMG)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          app_version="${{ steps.version.outputs.prefix }}"

          publish_dir="${GITHUB_WORKSPACE}/dist/${{ matrix.publish_dir }}"
          bundle_dir="${GITHUB_WORKSPACE}/dist/${{ env.APP_NAME }}.app"
          contents_dir="${bundle_dir}/Contents"
          macos_dir="${contents_dir}/MacOS"
          resources_dir="${contents_dir}/Resources"
          artifacts_dir="${GITHUB_WORKSPACE}/artifacts"
          dmg_root="${GITHUB_WORKSPACE}/dmg-root"
          rw_dmg="${artifacts_dir}/${{ matrix.publish_dir }}-rw.dmg"
          final_dmg_base="${artifacts_dir}/${{ matrix.publish_dir }}"
          mount_point="${GITHUB_WORKSPACE}/mounted-dmg"
          setfile_path="$(xcrun -find SetFile)"

          rm -rf "${bundle_dir}" "${dmg_root}" "${mount_point}"
          mkdir -p "${macos_dir}" "${resources_dir}" "${artifacts_dir}" "${dmg_root}"
          shopt -s dotglob nullglob
          for path in "${publish_dir}"/*; do
            name="$(basename "${path}")"
            if [[ -d "${path}" ]]; then
              cp -R "${path}" "${resources_dir}/${name}"
            else
              cp -R "${path}" "${macos_dir}/${name}"
            fi
          done
          shopt -u dotglob nullglob

          cp "${GITHUB_WORKSPACE}/Novalist.Desktop/${{ env.MACOS_ICON_FILE }}" "${resources_dir}/${{ env.MACOS_ICON_FILE }}"
          chmod +x "${macos_dir}/${{ env.EXECUTABLE_NAME }}"

          sed \
            -e "s/__APP_VERSION__/${app_version}/g" \
            -e "s/__EXECUTABLE_NAME__/${{ env.EXECUTABLE_NAME }}/g" \
            '.github/installers/macos/Info.plist.template' > "${contents_dir}/Info.plist"

          # Ad-hoc sign the bundle so Gatekeeper evaluates a consistent app bundle.
          xattr -cr "${bundle_dir}"
          find "${bundle_dir}" -type f \( -name '*.dylib' -o -perm -111 \) -print0 | while IFS= read -r -d '' file; do
            codesign --force --sign - --timestamp=none "${file}"
          done
          codesign --force --sign - --timestamp=none "${bundle_dir}"
          codesign --verify --deep --strict --verbose=2 "${bundle_dir}"

          cp -R "${bundle_dir}" "${dmg_root}/"
          cp "${GITHUB_WORKSPACE}/Novalist.Desktop/${{ env.MACOS_ICON_FILE }}" "${dmg_root}/.VolumeIcon.icns"
          ln -s /Applications "${dmg_root}/Applications"

          hdiutil create \
            -volname '${{ env.APP_NAME }}' \
            -srcfolder "${dmg_root}" \
            -ov \
            -fs HFS+ \
            -format UDRW \
            "${rw_dmg}"

          mkdir -p "${mount_point}"
          hdiutil attach \
            -readwrite \
            -noverify \
            -noautoopen \
            -mountpoint "${mount_point}" \
            "${rw_dmg}"

          "${setfile_path}" -a C "${mount_point}"
          "${setfile_path}" -a V "${mount_point}/.VolumeIcon.icns"

          hdiutil detach "${mount_point}"
          hdiutil convert "${rw_dmg}" -format UDZO -o "${final_dmg_base}"
          rm -f "${rw_dmg}"

      - name: Package app (Linux AppImage)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          publish_dir="${GITHUB_WORKSPACE}/dist/${{ matrix.publish_dir }}"
          appdir="${GITHUB_WORKSPACE}/AppDir"
          artifacts_dir="${GITHUB_WORKSPACE}/artifacts"

          # webkit2gtk-4.1 ABI (libsoup3-based) is what Avalonia.Controls.WebView
          # binds against. Available on Ubuntu 24.04+ / Debian 13+.
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            imagemagick \
            libwebkit2gtk-4.1-0 \
            libjavascriptcoregtk-4.1-0 \
            libsoup-3.0-0 \
            libgtk-3-0 \
            libgtk-3-bin \
            librsvg2-common \
            libfuse2t64 \
            gettext \
            desktop-file-utils \
            patchelf \
            wget

          convert "${GITHUB_WORKSPACE}/Novalist.Desktop/novalist.ico[0]" -resize 256x256 \
            "PNG32:${GITHUB_WORKSPACE}/${{ env.LINUX_ICON_FILE }}"

          # ── AppDir layout ────────────────────────────────────────────
          rm -rf "${appdir}"
          mkdir -p \
            "${appdir}/usr/bin" \
            "${appdir}/usr/share/applications" \
            "${appdir}/usr/share/icons/hicolor/256x256/apps" \
            "${appdir}/usr/lib/x86_64-linux-gnu/webkit2gtk-4.1/injected-bundle"

          cp -a "${publish_dir}/." "${appdir}/usr/bin/"
          chmod +x "${appdir}/usr/bin/${{ env.EXECUTABLE_NAME }}"

          # Bundle webkit2gtk helper binaries — these are dlopen-ed by the
          # WebKit network/web processes and must live at WEBKIT_EXEC_PATH.
          wk_libdir="/usr/lib/x86_64-linux-gnu/webkit2gtk-4.1"
          cp "${wk_libdir}/WebKitNetworkProcess" \
             "${appdir}/usr/lib/x86_64-linux-gnu/webkit2gtk-4.1/"
          cp "${wk_libdir}/WebKitWebProcess" \
             "${appdir}/usr/lib/x86_64-linux-gnu/webkit2gtk-4.1/" 2>/dev/null \
             || cp "${wk_libdir}/MiniBrowser" \
                   "${appdir}/usr/lib/x86_64-linux-gnu/webkit2gtk-4.1/" 2>/dev/null || true
          if [ -d "${wk_libdir}/injected-bundle" ]; then
            cp -a "${wk_libdir}/injected-bundle/." \
                  "${appdir}/usr/lib/x86_64-linux-gnu/webkit2gtk-4.1/injected-bundle/"
          fi

          # Desktop entry + icon at AppDir root (appimagetool requires this).
          cat > "${appdir}/novalist.desktop" <<'EOF'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=Novalist
          Comment=Standalone novel planning and writing app
          Exec=Novalist.Desktop
          Icon=novalist
          Terminal=false
          Categories=Office;WordProcessor;
          StartupNotify=true
          EOF
          cp "${appdir}/novalist.desktop" "${appdir}/usr/share/applications/"
          cp "${GITHUB_WORKSPACE}/${{ env.LINUX_ICON_FILE }}" "${appdir}/novalist.png"
          cp "${GITHUB_WORKSPACE}/${{ env.LINUX_ICON_FILE }}" \
             "${appdir}/usr/share/icons/hicolor/256x256/apps/novalist.png"

          # ── linuxdeploy + GTK plugin + appimagetool ──────────────────
          cd "${GITHUB_WORKSPACE}"
          wget -q -O linuxdeploy https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q -O linuxdeploy-plugin-gtk.sh https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          wget -q -O appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x linuxdeploy linuxdeploy-plugin-gtk.sh appimagetool

          export NO_STRIP=true
          export DEPLOY_GTK_VERSION=3

          ./linuxdeploy --appdir "${appdir}" \
            --plugin gtk \
            --executable "${appdir}/usr/bin/${{ env.EXECUTABLE_NAME }}" \
            --library /usr/lib/x86_64-linux-gnu/libwebkit2gtk-4.1.so.0 \
            --library /usr/lib/x86_64-linux-gnu/libjavascriptcoregtk-4.1.so.0 \
            --library /usr/lib/x86_64-linux-gnu/libsoup-3.0.so.0 \
            --desktop-file "${appdir}/usr/share/applications/novalist.desktop" \
            --icon-file "${appdir}/novalist.png"

          # linuxdeploy installs an AppRun that handles LD_LIBRARY_PATH and GTK
          # env. Wrap it so we can also point WebKit at our bundled helpers
          # before the .NET runtime spawns them.
          mv "${appdir}/AppRun" "${appdir}/AppRun.linuxdeploy"
          cat > "${appdir}/AppRun" <<'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          export WEBKIT_EXEC_PATH="${HERE}/usr/lib/x86_64-linux-gnu/webkit2gtk-4.1"
          export WEBKIT_INJECTED_BUNDLE_PATH="${HERE}/usr/lib/x86_64-linux-gnu/webkit2gtk-4.1/injected-bundle"
          # Disable WebKit's sandbox — bubblewrap inside AppImage is unreliable
          # across host kernels and user-namespace policies.
          export WEBKIT_FORCE_SANDBOX=0
          export WEBKIT_DISABLE_COMPOSITING_MODE=1
          exec "${HERE}/AppRun.linuxdeploy" "$@"
          EOF
          chmod +x "${appdir}/AppRun"

          mkdir -p "${artifacts_dir}"
          ARCH=x86_64 ./appimagetool --no-appstream \
            "${appdir}" "${artifacts_dir}/${{ matrix.package_name }}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/${{ matrix.package_name }}
          if-no-files-found: error

  sdk-and-example:
    name: Pack SDK & Example Extension
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore local tools
        run: dotnet tool restore

      - name: Derive version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VER="$(printf '%s' "$TAG" | grep -oE '[0-9]+(\.[0-9]+)*' || true)"
          if [ -z "$VER" ]; then VER="0.0.1"; fi
          echo "prefix=$VER" >> "$GITHUB_OUTPUT"

      # ── Download baseline NuGet from NuGet.org ─────────────────────
      - name: Download previous SDK NuGet
        id: baseline
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p baseline

          # Query NuGet.org for the latest published version
          INDEX_URL="https://api.nuget.org/v3-flatcontainer/novalist.sdk/index.json"
          VERSIONS_JSON=$(curl -sf "$INDEX_URL" || echo "")

          if [ -z "$VERSIONS_JSON" ]; then
            echo "has_baseline=false" >> "$GITHUB_OUTPUT"
            echo "Package not yet published on NuGet.org — first release."
            exit 0
          fi

          # Get the latest version (last entry in the versions array)
          PREV_VER=$(echo "$VERSIONS_JSON" | python3 -c "import sys,json; v=json.load(sys.stdin).get('versions',[]); print(v[-1] if v else '')")

          if [ -z "$PREV_VER" ]; then
            echo "has_baseline=false" >> "$GITHUB_OUTPUT"
            echo "No versions found on NuGet.org."
            exit 0
          fi

          # Download the nupkg directly from NuGet.org flat container
          NUPKG_URL="https://api.nuget.org/v3-flatcontainer/novalist.sdk/${PREV_VER}/novalist.sdk.${PREV_VER}.nupkg"
          curl -sfL "$NUPKG_URL" -o "baseline/Novalist.Sdk.${PREV_VER}.nupkg"

          echo "prev_version=$PREV_VER" >> "$GITHUB_OUTPUT"
          echo "has_baseline=true" >> "$GITHUB_OUTPUT"

          # Extract baseline DLL for comparison
          mkdir -p baseline/extracted
          unzip -q "baseline/Novalist.Sdk.${PREV_VER}.nupkg" -d baseline/extracted
          BASELINE_DLL=$(find baseline/extracted -name 'Novalist.Sdk.dll' | head -1)
          echo "baseline_dll=$BASELINE_DLL" >> "$GITHUB_OUTPUT"
          echo "Previous SDK version from NuGet.org: $PREV_VER"

      # ── Build SDK ─────────────────────────────────────────────────
      - name: Build SDK
        run: dotnet build Novalist.Sdk/Novalist.Sdk.csproj -c Release

      # ── SDK change detection (API comparison) ─────────────────────
      # Only publish a new SDK NuGet when the public API surface changes.
      # Implementation-only changes ship via the host app, not the NuGet.
      - name: Check SDK API changes
        id: sdk_check
        shell: bash
        run: |
          set -euo pipefail
          CURRENT_DLL="Novalist.Sdk/bin/Release/net8.0/Novalist.Sdk.dll"

          if [ "${{ steps.baseline.outputs.has_baseline }}" != "true" ]; then
            echo "sdk_changed=true" >> "$GITHUB_OUTPUT"
            echo "bump_type=patch" >> "$GITHUB_OUTPUT"
            echo "No baseline — treating SDK as changed (first release)."
            exit 0
          fi

          BASELINE_DLL="${{ steps.baseline.outputs.baseline_dll }}"

          # Pass 1: check for breaking changes
          if ! dotnet tool run apicompat -- -l "$BASELINE_DLL" -r "$CURRENT_DLL" --noWarn CP0003 2>&1; then
            echo "sdk_changed=true" >> "$GITHUB_OUTPUT"
            echo "bump_type=major" >> "$GITHUB_OUTPUT"
            echo "BREAKING changes detected → major bump"
            exit 0
          fi

          # Pass 2: check for API additions (strict mode)
          if ! dotnet tool run apicompat -- -l "$BASELINE_DLL" -r "$CURRENT_DLL" --strict-mode --noWarn CP0003 2>&1; then
            echo "sdk_changed=true" >> "$GITHUB_OUTPUT"
            echo "bump_type=minor" >> "$GITHUB_OUTPUT"
            echo "Non-breaking additions detected → minor bump"
            exit 0
          fi

          # API surface identical — no new NuGet needed
          echo "sdk_changed=false" >> "$GITHUB_OUTPUT"
          echo "SDK public API unchanged — skipping NuGet publish."

      # ── Calculate new SDK version ─────────────────────────────────
      - name: Calculate new SDK version
        id: calc_version
        if: steps.sdk_check.outputs.sdk_changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ steps.baseline.outputs.has_baseline }}" == "true" ]; then
            PREV="${{ steps.baseline.outputs.prev_version }}"
            BUMP="${{ steps.sdk_check.outputs.bump_type }}"
          else
            # No baseline (first release with this system) — use csproj version
            PREV=$(grep '<VersionPrefix>' Novalist.Sdk/Novalist.Sdk.csproj | sed 's/.*<VersionPrefix>\(.*\)<\/VersionPrefix>.*/\1/')
            # First release: use as-is
            echo "new_sdk_version=$PREV" >> "$GITHUB_OUTPUT"
            echo "First SDK release: $PREV"
            exit 0
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$PREV"
          PATCH=${PATCH:-0}

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VER="${MAJOR}.${MINOR}.${PATCH}"

          # Respect manual override: if csproj version is higher, use it
          CSPROJ_VER=$(grep '<VersionPrefix>' Novalist.Sdk/Novalist.Sdk.csproj | sed 's/.*<VersionPrefix>\(.*\)<\/VersionPrefix>.*/\1/')
          IFS='.' read -r CM Cm Cp <<< "$CSPROJ_VER"
          Cp=${Cp:-0}
          # Compare: csproj > calculated?
          if [ "$CM" -gt "$MAJOR" ] || \
             ([ "$CM" -eq "$MAJOR" ] && [ "$Cm" -gt "$MINOR" ]) || \
             ([ "$CM" -eq "$MAJOR" ] && [ "$Cm" -eq "$MINOR" ] && [ "$Cp" -gt "$PATCH" ]); then
            NEW_VER="$CSPROJ_VER"
            echo "Manual override: csproj version $CSPROJ_VER is higher than calculated $MAJOR.$MINOR.$PATCH"
          fi

          echo "new_sdk_version=$NEW_VER" >> "$GITHUB_OUTPUT"
          echo "SDK version: $PREV → $NEW_VER ($BUMP)"

      # ── Pack SDK NuGet ────────────────────────────────────────────
      - name: Pack SDK NuGet
        if: steps.sdk_check.outputs.sdk_changed == 'true'
        run: >-
          dotnet pack Novalist.Sdk/Novalist.Sdk.csproj
          -c Release
          -p:VersionPrefix=${{ steps.calc_version.outputs.new_sdk_version }}
          -p:VersionSuffix=
          -o artifacts

      # ── Reuse previous SDK NuGet when unchanged ───────────────────
      - name: Reuse previous SDK NuGet
        if: steps.sdk_check.outputs.sdk_changed == 'false'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          PREV_VER="${{ steps.baseline.outputs.prev_version }}"
          cp "baseline/Novalist.Sdk.${PREV_VER}.nupkg" artifacts/
          echo "Reused SDK NuGet $PREV_VER from NuGet.org (no changes detected)"

      # ── Push to NuGet.org ──────────────────────────────────────────
      - name: Push to NuGet.org
        if: steps.sdk_check.outputs.sdk_changed == 'true'
        run: >-
          dotnet nuget push artifacts/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      # ── Update SDK version in csproj ──────────────────────────────
      - name: Update SDK csproj version
        if: steps.sdk_check.outputs.sdk_changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          NEW_VER="${{ steps.calc_version.outputs.new_sdk_version }}"
          sed -i "s|<VersionPrefix>.*</VersionPrefix>|<VersionPrefix>${NEW_VER}</VersionPrefix>|" Novalist.Sdk/Novalist.Sdk.csproj
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Novalist.Sdk/Novalist.Sdk.csproj
          if git diff --cached --quiet; then
            echo "No version change to commit."
          else
            DEFAULT_BRANCH=$(git remote show origin | sed -n '/HEAD branch/s/.*: //p')
            git commit -m "chore(sdk): bump SDK version to ${NEW_VER} [skip ci]"
            git push origin HEAD:"${DEFAULT_BRANCH}"
          fi

      # ── Build & package Example Extension ─────────────────────────
      - name: Build Example Extension
        run: >-
          dotnet build Novalist.Sdk.Example/Novalist.Sdk.Example.csproj
          -c Release
          -p:VersionPrefix=${{ steps.version.outputs.prefix }}
          -p:VersionSuffix=

      - name: Zip Example Extension
        shell: bash
        run: |
          set -euo pipefail
          out="Novalist.Sdk.Example/bin/Release/net8.0"
          staging="${GITHUB_WORKSPACE}/ext-staging"
          mkdir -p "${staging}/Themes" "${staging}/Locales"
          cp "${out}/Novalist.Sdk.Example.dll" "${staging}/"
          cp "${out}/Novalist.Sdk.dll" "${staging}/"
          cp "${out}/extension.json" "${staging}/"
          cp "${out}"/Themes/*.axaml "${staging}/Themes/" 2>/dev/null || true
          cp "${out}"/Locales/*.json "${staging}/Locales/" 2>/dev/null || true
          mkdir -p artifacts
          cd "${staging}"
          zip -r "${GITHUB_WORKSPACE}/artifacts/novalist-example-extension.zip" .

      - name: Upload SDK NuGet
        uses: actions/upload-artifact@v4
        with:
          name: novalist-sdk-nupkg
          path: artifacts/*.nupkg
          if-no-files-found: error

      - name: Upload Example Extension zip
        uses: actions/upload-artifact@v4
        with:
          name: novalist-example-extension
          path: artifacts/novalist-example-extension.zip
          if-no-files-found: error

  release:
    name: Create release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: [publish, sdk-and-example]
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/*.dmg
            release-assets/*.exe
            release-assets/*.AppImage
            release-assets/*.nupkg
            release-assets/*.zip